
[database]
# 数据库文件路径
db_path = pipes.db

[ui]
# 窗口标题
window_title = 钢管原料进出入库管理系统
# 窗口大小
window_width = 1200
window_height = 800
# 窗口图标路径（可选）
icon_path = steel_pipe.ico

[colors]
# 顶部导航栏背景色
nav_bg = #2c3e50
# 主内容区域背景色
content_bg = #ecf0f1
# 左侧按钮区域背景色
button_bg = #34495e
# 钢管入库按钮颜色
entry_btn = #3498db
# 钢管出库按钮颜色
exit_btn = #e74c3c
# 库存查询按钮颜色
inventory_btn = #2ecc71
# 出入库记录按钮颜色
records_btn = #f39c12
# 数据统计按钮颜色
stats_btn = #9b59b6
# 退出系统按钮颜色
close_btn = #95a5a6

[fonts]
# 字体名称
font_family = 微软雅黑
# 标题字体大小
title_size = 18
# 按钮字体大小
button_size = 12
# 标签字体大小
label_size = 10
# 输入框字体大小
entry_size = 10

[language]
# 系统语言
language = zh_CN
