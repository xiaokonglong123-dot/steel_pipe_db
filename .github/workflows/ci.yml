name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true
      - name: Toolchain info
        run: rustc --version && cargo --version
      - name: cargo check
        id: cargo_check
        run: |
          cargo check --verbose 2>&1 | tee /tmp/cargo-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          RUST_BACKTRACE: 1
        continue-on-error: true
      - name: Show cargo check output
        if: always()
        run: |
          echo '### Backend `cargo check` output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cargo-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Exit code: ${{ steps.cargo_check.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
      - name: Fail if cargo check failed
        if: steps.cargo_check.outputs.exit_code != '0'
        run: exit 1

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type-check
        id: tsc_check
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Show tsc output
        if: always()
        run: |
          echo '### Frontend `tsc --noEmit` output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/tsc-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Exit code: ${{ steps.tsc_check.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
      - name: Fail if tsc failed
        if: steps.tsc_check.outputs.exit_code != '0'
        run: exit 1
      - name: Vite build
        run: npm run build
