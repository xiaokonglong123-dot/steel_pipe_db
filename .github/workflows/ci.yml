name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (cargo check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Toolchain info
        run: rustc --version && cargo --version
      - run: cargo check 2>&1
        env:
          RUST_BACKTRACE: 1

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Check environment
        run: |
          node --version
          npx tsc --version
          npm ls zod typescript 2>&1 || true
          ls node_modules/zod/index.ts 2>/dev/null && echo "zod ESM entry exists"
      - run: npx tsc --noEmit 2>&1
      - run: npm run build
