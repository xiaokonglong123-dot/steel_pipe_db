name: Python Tests

on:
  push:
    branches: [ main, master, '**' ]
  pull_request:
    branches: [ main, master, '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pytest
      - name: Run Python tests (unittest via pytest for reports)
        run: |
          pytest -q --disable-warnings --maxfail=1 --junitxml=reports/junit.xml
