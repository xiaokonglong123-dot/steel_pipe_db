<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Steel Pipe DB</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { font-size: 24px; }
    #form { margin-bottom: 20px; }
    input, select { margin-right: 8px; padding: 6px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
    tr:hover { background: #f0f0f0; cursor: pointer; }
    #msg { color: red; }
  </style>
  </head>
  <body>
  <h1>Steel Pipe Inventory</h1>
  <div id="form">
    <input id="diameter" placeholder="Diameter (mm)" type="number" step="0.01" />
    <input id="thickness" placeholder="Thickness (mm)" type="number" step="0.01" />
    <input id="length" placeholder="Length (m)" type="number" step="0.01" />
    <select id="material">
      <option value="">Material</option>
      <option value="Carbon Steel">Carbon Steel</option>
      <option value="Stainless Steel">Stainless Steel</option>
      <option value="Alloy Steel">Alloy Steel</option>
    </select>
    <input id="quantity" placeholder="Quantity" type="number" />
    <button id="addBtn">Add</button>
    <button id="updateBtn" disabled>Update</button>
    <button id="deleteBtn" disabled>Delete</button>
  </div>
  <div id="msg"></div>
  <table id="pipesTable">
    <thead>
      <tr><th>ID</th><th>Diameter</th><th>Thickness</th><th>Length</th><th>Material</th><th>Quantity</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let selectedId = null;
    async function loadPipes(){
      const res = await fetch('/pipes');
      const data = await res.json();
      const tbody = document.querySelector('#pipesTable tbody');
      tbody.innerHTML = '';
      data.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.id}</td><td>${p.diameter}</td><td>${p.thickness}</td><td>${p.length}</td><td>${p.material}</td><td>${p.quantity}</td>`;
        tr.addEventListener('click', () => { selectPipe(p); });
        tbody.appendChild(tr);
      });
    }
    function selectPipe(p){
      selectedId = p.id;
      document.getElementById('diameter').value = p.diameter;
      document.getElementById('thickness').value = p.thickness;
      document.getElementById('length').value = p.length;
      document.getElementById('material').value = p.material;
      document.getElementById('quantity').value = p.quantity;
      document.getElementById('updateBtn').disabled = false;
      document.getElementById('deleteBtn').disabled = false;
    }
    async function addPipe(){
      const d = parseFloat(document.getElementById('diameter').value);
      const t = parseFloat(document.getElementById('thickness').value);
      const l = parseFloat(document.getElementById('length').value);
      const m = document.getElementById('material').value;
      const q = parseInt(document.getElementById('quantity').value);
      if (!isFinite(d) || !isFinite(t) || !isFinite(l) || !m || !isFinite(q)){
        showMsg('Please fill all fields with valid numbers.');
        return;
      }
      const body = { diameter: d, thickness: t, length: l, material: m, quantity: q };
      const res = await fetch('/pipes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (res.ok){ loadPipes(); clearForm(); showMsg('Added', false); } else { showMsg('Error adding'); }
    }
    async function updatePipe(){
      if (!selectedId){ showMsg('No pipe selected for update'); return; }
      const d = parseFloat(document.getElementById('diameter').value);
      const t = parseFloat(document.getElementById('thickness').value);
      const l = parseFloat(document.getElementById('length').value);
      const m = document.getElementById('material').value;
      const q = parseInt(document.getElementById('quantity').value);
      if (!isFinite(d) || !isFinite(t) || !isFinite(l) || !m || !isFinite(q)){
        showMsg('Please fill all fields with valid numbers.');
        return;
      }
      const body = { diameter: d, thickness: t, length: l, material: m, quantity: q };
      const res = await fetch('/pipes/' + selectedId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (res.ok){ loadPipes(); clearForm(); showMsg('Updated', false); } else { showMsg('Error updating'); }
    }
    async function deletePipe(){
      if (!selectedId){ showMsg('No pipe selected for delete'); return; }
      if (!confirm('Delete selected pipe?')) return;
      const res = await fetch('/pipes/' + selectedId, { method: 'DELETE' });
      if (res.ok){ loadPipes(); clearForm(); showMsg('Deleted', false); } else { showMsg('Error deleting'); }
    }
    function clearForm(){
      selectedId = null;
      document.getElementById('diameter').value = '';
      document.getElementById('thickness').value = '';
      document.getElementById('length').value = '';
      document.getElementById('material').value = '';
      document.getElementById('quantity').value = '';
      document.getElementById('updateBtn').disabled = true;
      document.getElementById('deleteBtn').disabled = true;
    }
    function showMsg(text, ok=true){ const m = document.getElementById('msg'); m.style.color = ok ? 'green' : 'red'; m.textContent = text; setTimeout(()=>m.textContent='', 1500); }
    document.getElementById('addBtn').addEventListener('click', addPipe);
    document.getElementById('updateBtn').addEventListener('click', updatePipe);
    document.getElementById('deleteBtn').addEventListener('click', deletePipe);
    // initial load
    loadPipes();
  </script>
</body>
</html>
